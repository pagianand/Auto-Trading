name: Paper Trading Watchlist

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-watchlist:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper trader
        run: python paper_trader.py

      - name: Commit updated state and trade log
        run: |
          git config user.name "paper-trading-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state.json           
          [ -f data/trades.csv ] && git add data/trades.csv
          git diff --quiet --cached || git commit -m "Update paper trading state [skip ci]"
          git push
